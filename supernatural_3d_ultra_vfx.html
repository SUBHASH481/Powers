
<style>

<script>
const video=document.getElementById('videoEl');
const canvas=document.getElementById('canvas');
const ctx=canvas.getContext('2d');
const startScreen=document.getElementById('startScreen');
const startBtn=document.getElementById('startBtn');
const statEl=document.getElementById('statEl');
let power='fire', particles=[], handPoints=[], time=0, W=0, H=0;

document.querySelectorAll('.pb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.pb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); power=b.dataset.p; particles=[];
  });
});

function resize(){
  W=canvas.width=canvas.offsetWidth||window.innerWidth;
  H=canvas.height=canvas.offsetHeight||window.innerHeight;
}
window.addEventListener('resize',resize);

// ── Particle pool ──────────────────────────────────────────────
class Particle {
  constructor(x,y,type){
    this.reset(x,y,type);
  }
  reset(x,y,type){
    this.x=x; this.y=y; this.type=type;
    this.ox=x; this.oy=y;
    if(type==='fire'){
      this.vx=(Math.random()-.5)*3;
      this.vy=-(Math.random()*8+4);
      this.life=this.maxLife=50+Math.random()*60;
      this.size=Math.random()*28+12;
      this.hue=0; this.wobble=Math.random()*Math.PI*2;
      this.wobbleSpeed=Math.random()*.08+.04;
      this.depth=Math.random(); // simulated Z depth
    } else if(type==='ember'){
      const a=Math.random()*Math.PI*2, s=Math.random()*4+1;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-3;
      this.life=this.maxLife=30+Math.random()*40;
      this.size=Math.random()*3+1;
      this.hue=Math.random()*30;
    } else if(type==='ice_crystal'){
      const a=Math.random()*Math.PI*2, s=Math.random()*4+1;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=80+Math.random()*60;
      this.size=Math.random()*14+5;
      this.rot=Math.random()*Math.PI*2;
      this.rotSpd=(Math.random()-.5)*.06;
      this.depth=Math.random();
      this.arms=Math.random()>.5?6:8;
    } else if(type==='ice_shard'){
      const a=Math.random()*Math.PI*2, s=Math.random()*6+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=60+Math.random()*40;
      this.size=Math.random()*20+8;
      this.rot=Math.random()*Math.PI*2;
      this.rotSpd=(Math.random()-.5)*.04;
      this.depth=.3+Math.random()*.7;
    } else if(type==='bolt_spark'){
      const a=Math.random()*Math.PI*2, s=Math.random()*12+3;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=12+Math.random()*18;
      this.size=Math.random()*2+.5;
      this.hue=180+Math.random()*40;
    } else if(type==='shadow_tendril'){
      const a=Math.random()*Math.PI*2, s=Math.random()*5+1;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=50+Math.random()*50;
      this.size=Math.random()*18+6;
      this.rot=Math.random()*Math.PI*2;
      this.rotSpd=(Math.random()-.5)*.04;
      this.hue=270+Math.random()*40;
      this.depth=Math.random();
    } else if(type==='wind_stream'){
      const a=-(Math.PI*.5)+(Math.random()-.5)*.8;
      const s=Math.random()*12+5;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=25+Math.random()*25;
      this.size=Math.random()*3+1;
      this.pts=[];
      this.wobble=Math.random()*Math.PI*2;
    } else if(type==='leaf'){
      const a=-(Math.PI*.5)+(Math.random()-.5)*1.2;
      const s=Math.random()*5+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-1;
      this.life=this.maxLife=80+Math.random()*60;
      this.size=Math.random()*12+5;
      this.rot=Math.random()*Math.PI*2;
      this.rotSpd=(Math.random()-.5)*.08;
      this.hue=90+Math.random()*50;
      this.depth=Math.random();
    } else if(type==='star_dust'){
      const a=Math.random()*Math.PI*2, s=Math.random()*8+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=50+Math.random()*40;
      this.size=Math.random()*5+1;
      this.hue=260+Math.random()*100;
      this.trail=[];
      this.depth=Math.random();
    }
  }
  get t(){ return 1-this.life/this.maxLife; }
}

function spawnN(x,y,type,n){
  for(let i=0;i<n;i++){
    if(particles.length<3000) particles.push(new Particle(x,y,type));
  }
}

// ── Draw helpers ───────────────────────────────────────────────
function volumetricGlow(cx,cy,r,r2,g1,g2,a1,a2){
  const g=ctx.createRadialGradient(cx,cy,r,cx,cy,r2);
  g.addColorStop(0,g1.replace('A)',`,${a1})`));
  g.addColorStop(1,g2.replace('A)',`,${a2})`));
  ctx.beginPath();ctx.arc(cx,cy,r2,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
}

function drawFireParticle(p){
  const t=p.t, fade=t<.15?t/.15:t>.7?(1-t)/.3:1;
  const s=p.size*(1-t*.5)*(p.depth*.4+.6);
  const wx=Math.sin(p.wobble+time*p.wobbleSpeed)*s*.3;
  const cx=p.x+wx, cy=p.y;
  // 3-layer volumetric flame lobe
  const inner=ctx.createRadialGradient(cx,cy-s*.2,s*.05,cx,cy,s);
  inner.addColorStop(0,`rgba(255,255,220,${fade*.95})`);
  inner.addColorStop(.15,`rgba(255,240,100,${fade*.9})`);
  inner.addColorStop(.35,`rgba(255,130,0,${fade*.8})`);
  inner.addColorStop(.6,`rgba(200,30,0,${fade*.6})`);
  inner.addColorStop(.85,`rgba(100,10,0,${fade*.3})`);
  inner.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save();
  ctx.globalAlpha=1;
  ctx.beginPath();
  // teardrop shape: ellipse taller than wide
  ctx.ellipse(cx,cy-s*.15,s*.55,s,0,0,Math.PI*2);
  ctx.fillStyle=inner;ctx.fill();
  // rim highlight for 3D look
  const rim=ctx.createRadialGradient(cx-s*.2,cy-s*.4,0,cx,cy,s*.7);
  rim.addColorStop(0,`rgba(255,255,180,${fade*.4})`);
  rim.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.ellipse(cx,cy-s*.15,s*.55,s,0,0,Math.PI*2);
  ctx.fillStyle=rim;ctx.fill();
  ctx.restore();
}

function drawEmber(p){
  const t=p.t, fade=(1-t);
  ctx.save();
  ctx.globalAlpha=fade;
  ctx.shadowBlur=8;ctx.shadowColor=`hsl(${30+p.hue},100%,70%)`;
  ctx.fillStyle=`hsl(${p.hue},100%,${80-t*40}%)`;
  ctx.beginPath();ctx.arc(p.x,p.y,p.size*(1-t*.3),0,Math.PI*2);ctx.fill();
  ctx.restore();
}

function drawIceCrystal(p){
  const t=p.t, fade=t<.1?t/.1:(1-t);
  const s=p.size*(p.depth*.5+.5);
  ctx.save();
  ctx.globalAlpha=fade*.9;
  ctx.translate(p.x,p.y);ctx.rotate(p.rot);
  // 3D depth: darker face
  const depthShade=Math.floor(p.depth*60);
  for(let i=0;i<p.arms;i++){
    ctx.save();ctx.rotate(i*Math.PI*2/p.arms);
    // main arm with gradient
    const lg=ctx.createLinearGradient(0,0,0,s*2.5);
    lg.addColorStop(0,`rgba(200,245,255,1)`);
    lg.addColorStop(.4,`rgba(120,220,255,.9)`);
    lg.addColorStop(1,`rgba(40,180,220,.4)`);
    ctx.strokeStyle=lg;ctx.lineWidth=2.5-p.depth;
    ctx.shadowBlur=12;ctx.shadowColor='rgba(100,230,255,.8)';
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,s*2.5);ctx.stroke();
    // sub branches
    for(let j=1;j<4;j++){
      const by=s*2.5*(j*.25), bl=s*(1-j*.2)*.8;
      ctx.lineWidth=1.2-j*.2;
      ctx.beginPath();ctx.moveTo(0,by);ctx.lineTo(bl*.7,by-bl*.5);ctx.stroke();
      ctx.beginPath();ctx.moveTo(0,by);ctx.lineTo(-bl*.7,by-bl*.5);ctx.stroke();
      // tiny sub-sub
      if(j<3){
        const ml=bl*.4;
        ctx.lineWidth=.6;
        ctx.beginPath();ctx.moveTo(bl*.35,by-bl*.25);ctx.lineTo(bl*.35+ml*.5,by-bl*.25-ml*.4);ctx.stroke();
        ctx.beginPath();ctx.moveTo(-bl*.35,by-bl*.25);ctx.lineTo(-bl*.35-ml*.5,by-bl*.25-ml*.4);ctx.stroke();
      }
    }
    // hexagonal center gem
    ctx.restore();
  }
  // center gem
  const gem=ctx.createRadialGradient(-s*.1,-s*.15,0,0,0,s*.6);
  gem.addColorStop(0,'rgba(240,255,255,1)');
  gem.addColorStop(.4,'rgba(150,235,255,.9)');
  gem.addColorStop(1,'rgba(60,190,230,.2)');
  ctx.beginPath();
  for(let i=0;i<6;i++){
    const a=i*Math.PI/3, r=s*.55;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fillStyle=gem;ctx.fill();
  ctx.strokeStyle='rgba(200,250,255,.7)';ctx.lineWidth=1;ctx.stroke();
  ctx.restore();
}

function drawIceShard(p){
  const t=p.t, fade=t<.1?t/.1:(1-t);
  const s=p.size*(p.depth*.4+.6);
  ctx.save();
  ctx.globalAlpha=fade;
  ctx.translate(p.x,p.y);ctx.rotate(p.rot);
  // faceted shard
  const pts=[[0,-s],[s*.35,-s*.3],[s*.25,s*.5],[0,s*.3],[-s*.25,s*.5],[-s*.35,-s*.3]];
  ctx.beginPath();
  pts.forEach((pt,i)=>i===0?ctx.moveTo(pt[0],pt[1]):ctx.lineTo(pt[0],pt[1]));
  ctx.closePath();
  const sg=ctx.createLinearGradient(-s*.3,-s,s*.2,s*.4);
  sg.addColorStop(0,'rgba(220,248,255,.95)');
  sg.addColorStop(.3,'rgba(140,225,245,.85)');
  sg.addColorStop(.7,'rgba(60,185,230,.7)');
  sg.addColorStop(1,'rgba(20,130,200,.5)');
  ctx.fillStyle=sg;ctx.fill();
  // specular highlight
  ctx.beginPath();
  ctx.moveTo(-s*.05,-s*.8);ctx.lineTo(s*.15,-s*.3);ctx.lineTo(0,-s*.25);ctx.closePath();
  ctx.fillStyle='rgba(255,255,255,.7)';ctx.fill();
  ctx.strokeStyle='rgba(180,240,255,.6)';ctx.lineWidth=.8;
  ctx.beginPath();pts.forEach((pt,i)=>i===0?ctx.moveTo(pt[0],pt[1]):ctx.lineTo(pt[0],pt[1]));
  ctx.closePath();ctx.stroke();
  ctx.restore();
}

function drawLightningBolt(x1,y1,x2,y2,col,rough,depth){
  if(depth>5||Math.hypot(x2-x1,y2-y1)<3) return;
  const mx=(x1+x2)/2+(Math.random()-.5)*rough*3;
  const my=(y1+y2)/2+(Math.random()-.5)*rough*3;
  ctx.lineWidth=Math.max(.2,2.5-depth*.5);
  ctx.strokeStyle=col;
  ctx.shadowBlur=depth<2?28:12;ctx.shadowColor=col;
  ctx.globalAlpha=Math.max(.05,.95-depth*.17);
  ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(mx,my);ctx.stroke();
  ctx.beginPath();ctx.moveTo(mx,my);ctx.lineTo(x2,y2);ctx.stroke();
  if(depth<3&&Math.random()>.45){
    const ba=Math.atan2(y2-y1,x2-x1)+(Math.random()-.5)*1.2;
    const bl=Math.hypot(x2-x1,y2-y1)*(Math.random()*.55+.25);
    drawLightningBolt(mx,my,mx+Math.cos(ba)*bl,my+Math.sin(ba)*bl,col,rough*.6,depth+2);
  }
  drawLightningBolt(x1,y1,mx,my,col,rough*.7,depth+1);
  drawLightningBolt(mx,my,x2,y2,col,rough*.7,depth+1);
}

function drawShadowTendril(p){
  const t=p.t, fade=t<.1?t/.1:(1-t);
  const s=p.size*(p.depth*.4+.6);
  ctx.save();ctx.globalAlpha=fade*.85;
  ctx.translate(p.x,p.y);ctx.rotate(p.rot+time*.02);
  const g=ctx.createRadialGradient(0,-s*.2,0,0,s*.3,s*1.6);
  g.addColorStop(0,`hsla(${p.hue},90%,35%,.9)`);
  g.addColorStop(.4,`hsla(${p.hue-10},80%,18%,.6)`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();
  ctx.ellipse(0,0,s*.5,s*1.3,0,0,Math.PI*2);
  ctx.fillStyle=g;ctx.fill();
  // crack lines
  ctx.strokeStyle=`hsla(${p.hue+20},90%,60%,.4)`;ctx.lineWidth=.8;
  for(let i=0;i<3;i++){
    const a=i*Math.PI*.66+p.rot;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*s*.8,Math.sin(a)*s*.8);ctx.stroke();
  }
  ctx.restore();
}

function drawWindStream(p){
  const t=p.t, fade=(1-t);
  p.pts.push({x:p.x,y:p.y});
  if(p.pts.length>22) p.pts.shift();
  if(p.pts.length<3) return;
  ctx.save();
  for(let i=1;i<p.pts.length;i++){
    const prog=i/p.pts.length;
    ctx.globalAlpha=fade*prog*.7;
    ctx.strokeStyle=`rgba(${150+prog*60},${220+prog*30},${200+prog*30},1)`;
    ctx.lineWidth=p.size*(1-t*.4)*prog*2;
    ctx.lineCap='round';
    ctx.shadowBlur=6;ctx.shadowColor='rgba(100,255,200,.3)';
    ctx.beginPath();ctx.moveTo(p.pts[i-1].x,p.pts[i-1].y);ctx.lineTo(p.pts[i].x,p.pts[i].y);ctx.stroke();
  }
  ctx.restore();
}

function drawLeaf(p){
  const t=p.t, fade=t<.05?t/.05:(1-t);
  const s=p.size*(p.depth*.4+.6);
  ctx.save();ctx.globalAlpha=fade;
  ctx.translate(p.x,p.y);ctx.rotate(p.rot);
  // 3D leaf with vein + shading
  const lg=ctx.createLinearGradient(-s*.5,0,s*.5,0);
  lg.addColorStop(0,`hsla(${p.hue},70%,30%,.9)`);
  lg.addColorStop(.5,`hsla(${p.hue+10},80%,50%,.95)`);
  lg.addColorStop(1,`hsla(${p.hue},70%,30%,.9)`);
  ctx.beginPath();
  ctx.moveTo(0,-s);
  ctx.bezierCurveTo(s*.8,-s*.5,s*.8,s*.5,0,s);
  ctx.bezierCurveTo(-s*.8,s*.5,-s*.8,-s*.5,0,-s);
  ctx.fillStyle=lg;ctx.fill();
  // specular
  ctx.beginPath();ctx.moveTo(0,-s*.7);ctx.bezierCurveTo(s*.3,-s*.4,s*.2,0,0,0);
  ctx.strokeStyle='rgba(255,255,255,.3)';ctx.lineWidth=1;ctx.stroke();
  // vein
  ctx.beginPath();ctx.moveTo(0,-s*.9);ctx.lineTo(0,s*.9);
  ctx.strokeStyle=`hsla(${p.hue-10},60%,25%,.6)`;ctx.lineWidth=.8;ctx.stroke();
  ctx.restore();
}

function drawStarDust(p){
  const t=p.t, fade=(1-t);
  if(p.trail) p.trail.push({x:p.x,y:p.y});
  if(p.trail&&p.trail.length>14) p.trail.shift();
  ctx.save();
  if(p.trail&&p.trail.length>2){
    ctx.beginPath();ctx.moveTo(p.trail[0].x,p.trail[0].y);
    p.trail.forEach(pt=>ctx.lineTo(pt.x,pt.y));
    ctx.strokeStyle=`hsla(${p.hue},100%,75%,.4)`;
    ctx.lineWidth=p.size*.7;ctx.shadowBlur=8;ctx.shadowColor=`hsl(${p.hue},100%,70%)`;
    ctx.globalAlpha=fade*.5;ctx.stroke();
  }
  ctx.globalAlpha=fade;
  ctx.shadowBlur=16;ctx.shadowColor=`hsl(${p.hue},100%,70%)`;
  // 4-point star shape
  ctx.fillStyle=`hsl(${p.hue},100%,80%)`;
  ctx.beginPath();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4, r=i%2===0?p.size*p.depth+1:p.size*.3;
    i===0?ctx.moveTo(Math.cos(a)*r,Math.sin(a)*r):ctx.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  ctx.closePath();ctx.fill();
  ctx.fillStyle='#fff';ctx.shadowBlur=0;
  ctx.beginPath();ctx.arc(p.x,p.y,p.size*.2,0,Math.PI*2);ctx.fill();
  ctx.restore();
}

// ── Palm freeze effect ─────────────────────────────────────────
function drawPalmFreeze(cx,cy,scale){
  ctx.save();ctx.translate(cx,cy);
  // ice shell over palm – multiple concentric hex rings
  for(let ring=0;ring<3;ring++){
    const r=18+ring*16, npts=6;
    ctx.globalAlpha=(.5-ring*.12);
    ctx.strokeStyle=`rgba(${160+ring*20},${235+ring*10},255,1)`;
    ctx.lineWidth=1.5-ring*.3;
    ctx.shadowBlur=10;ctx.shadowColor='rgba(100,220,255,.8)';
    ctx.beginPath();
    for(let i=0;i<npts;i++){
      const a=i*Math.PI/3+time*.005, rx=Math.cos(a)*r*scale, ry=Math.sin(a)*r*scale*.7;
      i===0?ctx.moveTo(rx,ry):ctx.lineTo(rx,ry);
    }
    ctx.closePath();ctx.stroke();
  }
  // radial frost spikes from palm
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6+time*.008;
    const len=(28+Math.sin(a*2+time*.1)*8)*scale;
    ctx.globalAlpha=.35+Math.sin(a+time*.05)*.15;
    ctx.strokeStyle='rgba(180,245,255,.7)';
    ctx.lineWidth=.8;ctx.shadowBlur=6;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(Math.cos(a)*len,Math.sin(a)*len);ctx.stroke();
  }
  ctx.restore();
}

function drawFireCrown(cx,cy,scale){
  ctx.save();
  // outer heat distortion ring
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+time*.03;
    const r=(35+Math.sin(a+time*.07)*10)*scale;
    const tx=cx+Math.cos(a)*r, ty=cy+Math.sin(a)*r;
    const g=ctx.createRadialGradient(tx,ty,0,tx,ty,16*scale);
    g.addColorStop(0,'rgba(255,200,50,.7)');g.addColorStop(.5,'rgba(255,80,0,.3)');g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.globalAlpha=.6;ctx.beginPath();ctx.arc(tx,ty,16*scale,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  }
  ctx.restore();
}

function drawShadowVortex(cx,cy){
  ctx.save();
  for(let ring=0;ring<4;ring++){
    const r=20+ring*20+Math.sin(time*.04+ring)*6;
    const rot=time*.025*(ring%2===0?1:-1);
    ctx.globalAlpha=.3-ring*.05;
    for(let i=0;i<5;i++){
      const a=i*Math.PI*2/5+rot;
      const tx=cx+Math.cos(a)*r, ty=cy+Math.sin(a)*r;
      const g=ctx.createRadialGradient(tx,ty,0,tx,ty,14);
      g.addColorStop(0,`hsla(${270+ring*15},90%,40%,.8)`);
      g.addColorStop(1,'rgba(0,0,0,0)');
      ctx.beginPath();ctx.arc(tx,ty,14,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
    }
  }
  ctx.restore();
}

function drawWindCone(cx,cy){
  ctx.save();
  for(let i=0;i<7;i++){
    const t2=time*.035+i*(Math.PI*2/7);
    const rx=55+Math.sin(t2)*20, ry=30+Math.cos(t2)*10;
    ctx.globalAlpha=.06+i*.01;
    ctx.strokeStyle=`hsl(${160+i*8},70%,${65+i*3}%)`;
    ctx.lineWidth=3-i*.2;
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,t2*.4,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

function drawGalaxyCore(cx,cy){
  ctx.save();
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,60);
  g.addColorStop(0,'rgba(220,180,255,.6)');
  g.addColorStop(.3,'rgba(140,80,240,.3)');
  g.addColorStop(.7,'rgba(60,20,180,.15)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.beginPath();ctx.arc(cx,cy,60,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  // spiral arms
  for(let arm=0;arm<3;arm++){
    const offset=arm*Math.PI*2/3+time*.02;
    ctx.beginPath();
    for(let i=0;i<60;i++){
      const a=offset+i*.12, r=i*.8;
      const px=cx+Math.cos(a)*r, py=cy+Math.sin(a)*r*.6;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.strokeStyle=`hsla(${260+arm*30},90%,70%,.25)`;
    ctx.lineWidth=2;ctx.stroke();
  }
  ctx.restore();
}

function drawNatureAura(cx,cy){
  ctx.save();
  for(let i=0;i<10;i++){
    const a=time*.02+i*Math.PI*.2, r=45+Math.sin(time*.04+i)*12;
    const lx=cx+Math.cos(a)*r, ly=cy+Math.sin(a)*r*.8;
    ctx.globalAlpha=.22;ctx.fillStyle=`hsl(${90+i*12},75%,50%)`;
    ctx.beginPath();ctx.arc(lx,ly,4+Math.sin(time*.05+i)*1.5,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ── Glow overlay ───────────────────────────────────────────────
function palmGlow(cx,cy,col1,col2,r){
  const g=ctx.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,col1);g.addColorStop(.5,col2);g.addColorStop(1,'rgba(0,0,0,0)');
  ctx.save();ctx.globalAlpha=.55+Math.sin(time*.12)*.1;
  ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fillStyle=g;ctx.fill();
  ctx.restore();
}

// ── Main render ────────────────────────────────────────────────
function animate(){
  requestAnimationFrame(animate);
  time++;
  ctx.clearRect(0,0,W,H);

  handPoints.forEach((hand,hi)=>{
    const m=hand.map(p=>({x:(1-p.x)*W,y:p.y*H}));
    const [wrist,,,,thumbTip,,,,indexTip,,,,middleTip,,,,ringTip,,,,pinkyTip]=m;
    const tips=[thumbTip,indexTip,middleTip,ringTip,pinkyTip];
    const palm={
      x:(wrist.x+indexTip.x+middleTip.x+ringTip.x+pinkyTip.x)/5,
      y:(wrist.y+indexTip.y+middleTip.y+ringTip.y+pinkyTip.y)/5
    };

    if(power==='fire'){
      palmGlow(palm.x,palm.y,'rgba(255,120,0,.7)','rgba(200,30,0,.25)',90);
      drawFireCrown(palm.x,palm.y,1);
      tips.forEach(t=>{ spawnN(t.x,t.y,'fire',5); spawnN(t.x,t.y,'ember',2); });
      spawnN(palm.x,palm.y,'fire',6); spawnN(palm.x,palm.y,'ember',3);
    } else if(power==='ice'){
      palmGlow(palm.x,palm.y,'rgba(180,240,255,.55)','rgba(60,180,230,.18)',80);
      drawPalmFreeze(palm.x,palm.y,1+Math.sin(time*.06)*.06);
      tips.forEach(t=>{ spawnN(t.x,t.y,'ice_crystal',2); spawnN(t.x,t.y,'ice_shard',1); });
      spawnN(palm.x,palm.y,'ice_shard',2); spawnN(palm.x,palm.y,'ice_crystal',2);
    } else if(power==='lightning'){
      palmGlow(palm.x,palm.y,'rgba(220,240,255,.5)','rgba(100,180,255,.15)',80);
      ctx.save();
      if(time%2===0){
        tips.forEach(t=>{
          const col=`hsl(${190+Math.random()*20},100%,88%)`;
          drawLightningBolt(t.x,t.y,t.x+(Math.random()-.5)*120,t.y-100-Math.random()*100,col,16,0);
          spawnN(t.x,t.y,'bolt_spark',4);
        });
        if(handPoints.length===2&&hi===0){
          const h2=handPoints[1].map(p=>({x:(1-p.x)*W,y:p.y*H}));
          const c2={x:(h2[0].x+h2[8].x+h2[12].x)/3,y:(h2[0].y+h2[8].y+h2[12].y)/3};
          drawLightningBolt(palm.x,palm.y,c2.x,c2.y,'rgba(200,235,255,.9)',28,0);
        }
      }
      ctx.restore();
    } else if(power==='shadow'){
      palmGlow(palm.x,palm.y,'rgba(100,20,180,.7)','rgba(40,0,80,.25)',90);
      drawShadowVortex(palm.x,palm.y);
      tips.forEach(t=>spawnN(t.x,t.y,'shadow_tendril',3));
      spawnN(palm.x,palm.y,'shadow_tendril',4);
    } else if(power==='wind'){
      palmGlow(palm.x,palm.y,'rgba(100,230,190,.35)','rgba(40,180,140,.1)',80);
      drawWindCone(palm.x,palm.y);
      tips.forEach(t=>spawnN(t.x,t.y,'wind_stream',3));
      spawnN(palm.x,palm.y,'wind_stream',5);
    } else if(power==='nature'){
      palmGlow(palm.x,palm.y,'rgba(60,200,80,.4)','rgba(20,120,40,.1)',80);
      drawNatureAura(palm.x,palm.y);
      tips.forEach(t=>spawnN(t.x,t.y,'leaf',2));
      spawnN(palm.x+(Math.random()-.5)*30,palm.y,'leaf',3);
    } else if(power==='galaxy'){
      palmGlow(palm.x,palm.y,'rgba(180,80,255,.45)','rgba(60,10,160,.15)',90);
      drawGalaxyCore(palm.x,palm.y);
      tips.forEach(t=>spawnN(t.x,t.y,'star_dust',3));
      spawnN(palm.x+(Math.random()-.5)*40,palm.y+(Math.random()-.5)*40,'star_dust',4);
    }

    // glowing finger dots
    const dc={fire:'#ff7040',ice:'#a0f0ff',lightning:'#fffde7',shadow:'#d7bde2',wind:'#a2e9d8',nature:'#82e0aa',galaxy:'#d8b4fe'}[power];
    ctx.save();
    tips.forEach(t=>{
      ctx.shadowBlur=20;ctx.shadowColor=dc;
      ctx.fillStyle=dc;ctx.globalAlpha=.95;
      ctx.beginPath();ctx.arc(t.x,t.y,5,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
  });

  // update & draw particles (back-to-front by depth)
  particles=particles.filter(p=>p.life>0);
  particles.sort((a,b)=>(a.depth||0)-(b.depth||0));
  particles.forEach(p=>{
    p.life--;
    p.x+=p.vx; p.y+=p.vy;
    switch(p.type){
      case 'fire': p.vx*=.97;p.vy*=.97;p.vx+=(Math.random()-.5)*.7;p.vy-=.12;p.wobble+=p.wobbleSpeed; break;
      case 'ember': p.vx*=.95;p.vy*=.96;p.vy-=.05;p.vx+=(Math.random()-.5)*.4; break;
      case 'ice_crystal': p.vx*=.93;p.vy*=.93;p.rot+=p.rotSpd; break;
      case 'ice_shard': p.vx*=.92;p.vy*=.93;p.rot+=p.rotSpd; break;
      case 'bolt_spark': p.vx*=.88;p.vy*=.88; break;
      case 'shadow_tendril': p.vx*=.93;p.vy*=.93;p.rot+=p.rotSpd;p.hue+=.5; break;
      case 'wind_stream': p.vx*=.96;p.vy*=.96;p.vx+=(Math.random()-.5)*.6;p.vy+=(Math.random()-.5)*.3; break;
      case 'leaf': p.vx*=.97;p.vy+=.04;p.vx+=(Math.random()-.5)*.3;p.rot+=p.rotSpd; break;
      case 'star_dust': p.vx*=.96;p.vy*=.96; break;
    }
    switch(p.type){
      case 'fire': drawFireParticle(p); break;
      case 'ember': drawEmber(p); break;
      case 'ice_crystal': drawIceCrystal(p); break;
      case 'ice_shard': drawIceShard(p); break;
      case 'bolt_spark':
        ctx.save();ctx.globalAlpha=(1-p.t);ctx.shadowBlur=10;ctx.shadowColor=`hsl(${p.hue},100%,80%)`;
        ctx.fillStyle=`hsl(${p.hue},100%,85%)`;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();ctx.restore(); break;
      case 'shadow_tendril': drawShadowTendril(p); break;
      case 'wind_stream': drawWindStream(p); break;
      case 'leaf': drawLeaf(p); break;
      case 'star_dust': drawStarDust(p); break;
    }
  });
}

async function startCamera(){
  startScreen.style.display='none';
  resize(); animate();
  try{
    const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}});
    video.srcObject=stream;
    await new Promise(res=>{video.onloadedmetadata=()=>video.play().then(res).catch(res);});
    statEl.textContent='Loading hand tracker...';
    const hands=new Hands({locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`});
    hands.setOptions({maxNumHands:2,modelComplexity:1,minDetectionConfidence:0.65,minTrackingConfidence:0.55});
    hands.onResults(r=>{handPoints=r.multiHandLandmarks||[];});
    await hands.initialize();
    statEl.textContent='Ready — pick your element!';
    setTimeout(()=>statEl.style.display='none',2500);
    const cam=new Camera(video,{onFrame:async()=>{await hands.send({image:video});},width:1280,height:720});
    cam.start();
  } catch(e){
    statEl.textContent='Camera error: '+e.message;
    statEl.style.color='#f87171';
  }
}
startBtn.addEventListener('click',startCamera);
</script>
