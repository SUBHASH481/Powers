<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SUPERNATURAL POWERS - Mystical Edition</title>
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
#wrap{position:relative;width:100%;height:100vh;min-height:580px;background:#0a0015;overflow:hidden;background:linear-gradient(135deg,#0a0015,#1a0033)}
#videoEl{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;transform:scaleX(-1)}
#canvas{position:absolute;inset:0;width:100%;height:100%}
#particleCanvas{position:absolute;inset:0;width:100%;height:100%}
#glowCanvas{position:absolute;inset:0;width:100%;height:100%}
#startScreen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:40px;z-index:30;background:rgba(10,0,21,.95);backdrop-filter:blur(15px);border:2px solid rgba(138,43,226,.3)}
#startScreen h1{color:#fff;font-size:56px;font-weight:900;font-family:'Arial Black',sans-serif;text-align:center;letter-spacing:4px;text-shadow:0 0 60px rgba(138,43,226,.8),0 0 100px rgba(100,50,255,.5);animation:titleGlow 3s ease-in-out infinite;background:linear-gradient(135deg,#8a2be2,#ff1493,#00ffff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
#startScreen p{color:#b0b0ff;font-size:17px;font-family:'Georgia',sans-serif;text-align:center;max-width:450px;line-height:2;letter-spacing:1px}
#startBtn{padding:18px 60px;border-radius:60px;background:linear-gradient(135deg,rgba(138,43,226,.3),rgba(255,20,147,.2));border:2.5px solid;border-image:linear-gradient(135deg,#8a2be2,#ff1493) 1;color:#00ffff;font-size:18px;font-weight:700;cursor:pointer;font-family:'Arial',sans-serif;transition:all .4s;box-shadow:0 0 40px rgba(138,43,226,.5),inset 0 0 30px rgba(138,43,226,.2);position:relative;overflow:hidden;text-transform:uppercase;letter-spacing:2px}
#startBtn::before{content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.4),transparent);transition:left .6s}
#startBtn:hover::before{left:100%}
#startBtn:hover{transform:scale(1.1);box-shadow:0 0 80px rgba(138,43,226,.8),inset 0 0 40px rgba(138,43,226,.4);border-image:linear-gradient(135deg,#00ffff,#8a2be2) 1}
@keyframes titleGlow{0%,100%{text-shadow:0 0 60px rgba(138,43,226,.8),0 0 100px rgba(100,50,255,.5);transform:scale(1)}50%{text-shadow:0 0 100px rgba(138,43,226,1),0 0 150px rgba(100,50,255,.8);transform:scale(1.03)}}
#ui{position:absolute;bottom:25px;left:0;right:0;padding:20px;display:flex;gap:12px;justify-content:center;flex-wrap:wrap;background:linear-gradient(180deg,transparent,rgba(10,0,21,.98),rgba(10,0,21,1));z-index:20;border-top:1px solid rgba(138,43,226,.2)}
.pb{padding:14px 28px;border-radius:30px;border:2px solid;background:rgba(20,5,40,.6);color:#fff;font-size:13px;font-weight:700;cursor:pointer;transition:all .4s;font-family:sans-serif;backdrop-filter:blur(8px);position:relative;overflow:hidden;text-transform:uppercase;letter-spacing:1px;box-shadow:0 0 20px rgba(138,43,226,.2)}
.pb::after{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:radial-gradient(circle at 30% 30%,rgba(255,255,255,.25),transparent);opacity:0;transition:opacity .3s}
.pb:hover::after{opacity:1}
.pb:hover{transform:translateY(-4px) scale(1.08);box-shadow:0 12px 35px currentColor,inset 0 0 30px currentColor}
.pb[data-p=void]{border-color:#1a1a2e;color:#00ffff;box-shadow:0 0 20px rgba(0,255,255,.3),inset 0 0 10px rgba(0,255,255,.1)}
.pb[data-p=void].active{background:rgba(0,255,255,.15);box-shadow:0 0 40px #00ffff80,inset 0 0 25px rgba(0,255,255,.25),0 0 60px rgba(0,255,255,.4)}
.pb[data-p=quantum]{border-color:#ff1493;color:#ff69b4;box-shadow:0 0 20px rgba(255,20,147,.3),inset 0 0 10px rgba(255,20,147,.1)}
.pb[data-p=quantum].active{background:rgba(255,20,147,.15);box-shadow:0 0 40px #ff1493a0,inset 0 0 25px rgba(255,20,147,.25),0 0 60px rgba(255,20,147,.4)}
.pb[data-p=inferno]{border-color:#ff6500;color:#ffaa00;box-shadow:0 0 20px rgba(255,101,0,.3),inset 0 0 10px rgba(255,101,0,.1)}
.pb[data-p=inferno].active{background:rgba(255,101,0,.15);box-shadow:0 0 40px #ff6500a0,inset 0 0 25px rgba(255,101,0,.25),0 0 60px rgba(255,101,0,.4)}
.pb[data-p=celestial]{border-color:#8a2be2;color:#da70d6;box-shadow:0 0 20px rgba(138,43,226,.3),inset 0 0 10px rgba(138,43,226,.1)}
.pb[data-p=celestial].active{background:rgba(138,43,226,.15);box-shadow:0 0 40px #8a2be2a0,inset 0 0 25px rgba(138,43,226,.25),0 0 60px rgba(138,43,226,.4)}
.pb[data-p=spectral]{border-color:#00ff88;color:#00ff88;box-shadow:0 0 20px rgba(0,255,136,.3),inset 0 0 10px rgba(0,255,136,.1)}
.pb[data-p=spectral].active{background:rgba(0,255,136,.15);box-shadow:0 0 40px #00ff8880,inset 0 0 25px rgba(0,255,136,.25),0 0 60px rgba(0,255,136,.4)}
#statEl{position:absolute;top:25px;left:50%;transform:translateX(-50%);color:#00ffff;font-size:14px;font-family:monospace;background:rgba(10,0,21,.9);padding:12px 25px;border-radius:25px;z-index:20;border:1.5px solid rgba(138,43,226,.5);backdrop-filter:blur(8px);box-shadow:0 0 30px rgba(138,43,226,.3);text-transform:uppercase;letter-spacing:1px}
.fps-counter{position:absolute;top:25px;right:25px;color:#00ff88;font-size:12px;font-family:monospace;background:rgba(10,0,21,.9);padding:10px 18px;border-radius:20px;border:1.5px solid rgba(0,255,136,.4);z-index:20;box-shadow:0 0 20px rgba(0,255,136,.2);text-transform:uppercase}
</style>
<div id="wrap">
  <div id="startScreen">
    <h1>⚡ SUPERNATURAL MASTERY ⚡</h1>
    <p>Awaken mystical powers beyond comprehension. Channel quantum energies and cosmic forces through your hands.</p>
    <button id="startBtn">✨ Unlock Power ✨</button>
  </div>
  <video id="videoEl" autoplay muted playsinline></video>
  <canvas id="glowCanvas"></canvas>
  <canvas id="particleCanvas"></canvas>
  <canvas id="canvas"></canvas>
  <div id="statEl">INITIALIZING...</div>
  <div class="fps-counter" id="fpsCounter">FPS: 60</div>
  <div id="ui">
    <button class="pb active" data-p="void">🌌 VOID FORCE</button>
    <button class="pb" data-p="quantum">⚛️ QUANTUM FLUX</button>
    <button class="pb" data-p="inferno">🔥 INFERNO RAGE</button>
    <button class="pb" data-p="celestial">✨ CELESTIAL WRATH</button>
    <button class="pb" data-p="spectral">👻 SPECTRAL ECHO</button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>

<script>
const video=document.getElementById('videoEl');
const canvas=document.getElementById('canvas');
const particleCanvas=document.getElementById('particleCanvas');
const glowCanvas=document.getElementById('glowCanvas');
const ctx=canvas.getContext('2d',{alpha:true});
const pctx=particleCanvas.getContext('2d',{alpha:true});
const gctx=glowCanvas.getContext('2d',{alpha:true});
const startScreen=document.getElementById('startScreen');
const startBtn=document.getElementById('startBtn');
const statEl=document.getElementById('statEl');
const fpsCounter=document.getElementById('fpsCounter');

let power='void', particles=[], handPoints=[], time=0, W=0, H=0;
let fps=60, frameCount=0, lastTime=Date.now();

document.querySelectorAll('.pb').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.pb').forEach(x=>x.classList.remove('active'));
    b.classList.add('active'); power=b.dataset.p; particles=[];
  });
});

function resize(){
  W=canvas.width=particleCanvas.width=glowCanvas.width=canvas.offsetWidth||window.innerWidth;
  H=canvas.height=particleCanvas.height=glowCanvas.height=canvas.offsetHeight||window.innerHeight;
}
window.addEventListener('resize',resize);

class MysticalParticle {
  constructor(x,y,type){
    this.reset(x,y,type);
  }
  reset(x,y,type){
    this.x=x; this.y=y; this.type=type;
    this.vx=this.vy=0;
    this.depth=Math.random();
    this.rotation=0;
    this.angularVel=0;
    this.trail=[];
    this.maxTrail=0;
    this.wobble=Math.random()*Math.PI*2;

    if(type==='void_warp'){
      const a=Math.random()*Math.PI*2, s=Math.random()*7+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=80+Math.random()*60;
      this.size=Math.random()*30+12;
      this.rotation=Math.random()*Math.PI*2;
      this.angularVel=(Math.random()-.5)*.04;
      this.hue=240+Math.random()*120;
    } else if(type==='void_tear'){
      const a=Math.random()*Math.PI*2, s=Math.random()*10+3;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=50+Math.random()*40;
      this.size=Math.random()*50+25;
      this.rotation=Math.random()*Math.PI*2;
      this.maxTrail=20;
    } else if(type==='quantum_orb'){
      const a=Math.random()*Math.PI*2, s=Math.random()*8+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=70+Math.random()*50;
      this.size=Math.random()*25+10;
      this.hue=270+Math.random()*90;
      this.wobbleSpeed=Math.random()*.12+.06;
    } else if(type==='quantum_spark'){
      const a=Math.random()*Math.PI*2, s=Math.random()*15+5;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=30+Math.random()*25;
      this.size=Math.random()*5+1;
      this.hue=280+Math.random()*80;
    } else if(type==='inferno_blaze'){
      const a=Math.random()*Math.PI*2, s=Math.random()*9+3;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-2;
      this.life=this.maxLife=60+Math.random()*70;
      this.size=Math.random()*40+18;
      this.hue=Math.random()*40;
      this.wobbleSpeed=Math.random()*.08+.04;
      this.glow=50+Math.random()*40;
    } else if(type==='inferno_ash'){
      const a=Math.random()*Math.PI*2, s=Math.random()*5+1;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s-3;
      this.life=this.maxLife=40+Math.random()*50;
      this.size=Math.random()*8+2;
      this.hue=15+Math.random()*30;
    } else if(type==='celestial_star'){
      const a=Math.random()*Math.PI*2, s=Math.random()*6+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=80+Math.random()*60;
      this.size=Math.random()*20+8;
      this.hue=260+Math.random()*70;
      this.maxTrail=15;
    } else if(type==='celestial_aura'){
      const a=Math.random()*Math.PI*2, s=Math.random()*7+2;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=70+Math.random()*50;
      this.size=Math.random()*35+15;
      this.rotation=Math.random()*Math.PI*2;
      this.angularVel=(Math.random()-.5)*.03;
    } else if(type==='spectral_ghost'){
      const a=Math.random()*Math.PI*2, s=Math.random()*6+1;
      this.vx=Math.cos(a)*s; this.vy=Math.sin(a)*s;
      this.life=this.maxLife=90+Math.random()*70;
      this.size=Math.random()*28+12;
      this.hue=120+Math.random()*40;
      this.maxTrail=18;
    }
  }
  get t(){ return 1-this.life/this.maxLife; }
}

function spawnN(x,y,type,n){
  for(let i=0;i<n;i++){
    if(particles.length<6000) particles.push(new MysticalParticle(x,y,type));
  }
}

function spawnExplosion(x,y,type,amount){
  for(let i=0;i<amount;i++){
    const angle=i*Math.PI*2/amount;
    const p=new MysticalParticle(x,y,type);
    const speed=Math.random()*8+4;
    p.vx=Math.cos(angle)*speed;
    p.vy=Math.sin(angle)*speed;
    if(particles.length<6000) particles.push(p);
  }
}

// Drawing functions
function drawVoidWarp(p,c){
  const t=p.t, fade=Math.pow(1-t,1.3);
  const s=p.size*(p.depth*.5+.5);
  c.save();
  c.globalAlpha=fade*.8;
  c.translate(p.x,p.y);
  c.rotate(p.rotation);
  
  const g=c.createRadialGradient(0,0,0,0,0,s);
  g.addColorStop(0,`hsla(${p.hue},100%,50%,${fade*.9})`);
  g.addColorStop(.5,`hsla(${p.hue+20},80%,30%,${fade*.5})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  
  c.beginPath();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4;
    const r=s*Math.sin(i+time*.05);
    c.lineTo(Math.cos(a)*r,Math.sin(a)*r);
  }
  c.closePath();
  c.fillStyle=g;
  c.fill();
  
  c.shadowBlur=25;
  c.shadowColor=`hsl(${p.hue},100%,50%)`;
  c.restore();
}

function drawQuantumOrb(p,c){
  const t=p.t, fade=Math.pow(1-t,1.1);
  const s=p.size*(p.depth*.6+.4);
  const wobble=Math.sin(p.wobble+time*p.wobbleSpeed);
  
  c.save();
  c.globalAlpha=fade;
  
  const layers=[
    {stop:0,color:`hsla(${p.hue},100%,70%,${fade})`},
    {stop:.4,color:`hsla(${p.hue+10},90%,40%,${fade*.7})`},
    {stop:1,color:'rgba(0,0,0,0)'}
  ];
  
  const g=c.createRadialGradient(p.x,p.y,s*.1,p.x,p.y,s);
  layers.forEach(l=>g.addColorStop(l.stop,l.color));
  
  c.beginPath();
  c.arc(p.x,p.y,s,0,Math.PI*2);
  c.fillStyle=g;
  c.fill();
  
  c.shadowBlur=30;
  c.shadowColor=`hsl(${p.hue},100%,60%)`;
  c.restore();
}

function drawInfernoBlaze(p,c){
  const t=p.t, fade=Math.pow(1-t,1.15);
  const s=p.size*(1-t*.5)*(p.depth*.5+.5);
  const wx=Math.sin(p.wobble+time*p.wobbleSpeed)*s*.3;
  const cx=p.x+wx, cy=p.y;
  
  c.save();
  c.globalAlpha=1;
  
  const layers=[
    {stop:0,color:`rgba(255,255,180,${fade*.95})`},
    {stop:.2,color:`rgba(255,150,20,${fade*.9})`},
    {stop:.5,color:`rgba(255,80,0,${fade*.8})`},
    {stop:.8,color:`rgba(200,20,0,${fade*.5})`},
    {stop:1,color:'rgba(0,0,0,0)'}
  ];
  
  const inner=c.createRadialGradient(cx,cy-s*.2,s*.1,cx,cy,s);
  layers.forEach(l=>inner.addColorStop(l.stop,l.color));
  
  c.beginPath();
  c.ellipse(cx,cy,s*.6,s,0,0,Math.PI*2);
  c.fillStyle=inner;
  c.fill();
  
  c.shadowBlur=40;
  c.shadowColor='rgba(255,100,0,.8)';
  c.restore();
}

function drawCelestialStar(p,c){
  const t=p.t, fade=Math.pow(1-t,.8);
  
  if(p.maxTrail>0){
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>p.maxTrail) p.trail.shift();
  }
  
  c.save();
  if(p.trail.length>2){
    c.globalAlpha=fade*.3;
    c.strokeStyle=`hsl(${p.hue},100%,60%)`;
    c.lineWidth=3;
    c.shadowBlur=15;
    c.shadowColor=`hsl(${p.hue},100%,70%)`;
    c.beginPath();
    c.moveTo(p.trail[0].x,p.trail[0].y);
    p.trail.forEach(pt=>c.lineTo(pt.x,pt.y));
    c.stroke();
  }
  
  c.globalAlpha=fade;
  c.shadowBlur=25;
  c.shadowColor=`hsl(${p.hue},100%,70%)`;
  
  c.fillStyle=`hsl(${p.hue},100%,80%)`;
  c.beginPath();
  for(let i=0;i<12;i++){
    const a=i*Math.PI/6;
    const r=i%2===0?5:2;
    c.lineTo(p.x+Math.cos(a)*r,p.y+Math.sin(a)*r);
  }
  c.closePath();
  c.fill();
  c.restore();
}

function drawSpectralGhost(p,c){
  const t=p.t, fade=Math.pow(1-t,.9);
  const s=p.size*(p.depth*.5+.5);
  
  if(p.maxTrail>0){
    p.trail.push({x:p.x,y:p.y});
    if(p.trail.length>p.maxTrail) p.trail.shift();
  }
  
  c.save();
  c.globalAlpha=fade*.6;
  
  const g=c.createRadialGradient(p.x,p.y-s*.3,s*.1,p.x,p.y,s);
  g.addColorStop(0,`hsla(${p.hue},100%,60%,${fade})`);
  g.addColorStop(.5,`hsla(${p.hue},80%,40%,${fade*.5})`);
  g.addColorStop(1,'rgba(0,0,0,0)');
  
  c.beginPath();
  c.arc(p.x,p.y,s,0,Math.PI*2);
  c.fillStyle=g;
  c.fill();
  
  c.shadowBlur=20;
  c.shadowColor=`hsl(${p.hue},100%,50%)`;
  c.restore();
}

// Palm effects
function drawVoidAura(cx,cy,c){
  c.save();
  for(let ring=0;ring<5;ring++){
    const r=15+ring*18+Math.sin(time*.05+ring)*8;
    c.globalAlpha=(.5-ring*.08);
    c.strokeStyle=`hsl(${250+ring*5},100%,${50+ring*5}%)`;
    c.lineWidth=2.5-ring*.3;
    c.shadowBlur=20;
    c.shadowColor='rgba(0,255,255,.5)';
    c.beginPath();
    for(let i=0;i<6;i++){
      const a=i*Math.PI/3+time*.005;
      const rx=Math.cos(a)*r;
      const ry=Math.sin(a)*r*.8;
      i===0?c.moveTo(rx,ry):c.lineTo(rx,ry);
    }
    c.closePath();
    c.stroke();
  }
  c.restore();
}

function drawQuantumField(cx,cy,c){
  c.save();
  for(let i=0;i<8;i++){
    const a=i*Math.PI/4+time*.03;
    const r=40+Math.sin(a+time*.1)*15;
    const tx=cx+Math.cos(a)*r;
    const ty=cy+Math.sin(a)*r;
    
    const g=c.createRadialGradient(tx,ty,0,tx,ty,20);
    g.addColorStop(0,'rgba(255,20,147,.7)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    
    c.globalAlpha=.6;
    c.beginPath();
    c.arc(tx,ty,20,0,Math.PI*2);
    c.fillStyle=g;
    c.fill();
  }
  c.restore();
}

function drawInfernoRing(cx,cy,c){
  c.save();
  for(let i=0;i<10;i++){
    const a=i*Math.PI/5+time*.04;
    const r=45+Math.sin(a+time*.08)*12;
    const tx=cx+Math.cos(a)*r;
    const ty=cy+Math.sin(a)*r;
    
    const g=c.createRadialGradient(tx,ty,0,tx,ty,18);
    g.addColorStop(0,'rgba(255,100,0,.8)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    
    c.globalAlpha=.7;
    c.beginPath();
    c.arc(tx,ty,18,0,Math.PI*2);
    c.fillStyle=g;
    c.fill();
  }
  c.restore();
}

function drawCelestialHalo(cx,cy,c){
  c.save();
  const g=c.createRadialGradient(cx,cy,0,cx,cy,100);
  g.addColorStop(0,'rgba(220,100,255,.4)');
  g.addColorStop(.3,'rgba(138,43,226,.2)');
  g.addColorStop(1,'rgba(0,0,0,0)');
  
  c.globalAlpha=.5;
  c.beginPath();
  c.arc(cx,cy,100,0,Math.PI*2);
  c.fillStyle=g;
  c.fill();
  c.shadowBlur=40;
  c.shadowColor='rgba(138,43,226,.6)';
  
  c.restore();
}

function drawSpectralVeil(cx,cy,c){
  c.save();
  for(let i=0;i<7;i++){
    const t2=time*.035+i*(Math.PI*2/7);
    const rx=60+Math.sin(t2)*20;
    const ry=40+Math.cos(t2)*15;
    c.globalAlpha=.1+i*.012;
    c.strokeStyle=`hsl(${120+i*5},100%,${60+i*3}%)`;
    c.lineWidth=3;
    c.lineCap='round';
    c.beginPath();
    c.ellipse(cx,cy,rx,ry,t2*.5,0,Math.PI*2);
    c.stroke();
  }
  c.restore();
}

function palmGlow(cx,cy,col1,col2,r,c){
  const g=c.createRadialGradient(cx,cy,0,cx,cy,r);
  g.addColorStop(0,col1);
  g.addColorStop(.6,col2);
  g.addColorStop(1,'rgba(0,0,0,0)');
  c.save();
  c.globalAlpha=.5+Math.sin(time*.12)*.15;
  c.beginPath();
  c.arc(cx,cy,r,0,Math.PI*2);
  c.fillStyle=g;
  c.fill();
  c.restore();
}

function animate(){
  requestAnimationFrame(animate);
  time++;
  
  frameCount++;
  const now=Date.now();
  if(now>=lastTime+1000){
    fps=frameCount;
    fpsCounter.textContent=`FPS: ${fps}`;
    frameCount=0;
    lastTime=now;
  }
  
  ctx.clearRect(0,0,W,H);
  pctx.clearRect(0,0,W,H);
  gctx.clearRect(0,0,W,H);
  
  handPoints.forEach((hand,hi)=>{
    const m=hand.map(p=>({x:(1-p.x)*W,y:p.y*H}));
    const [wrist,,,,thumbTip,,,,indexTip,,,,middleTip,,,,ringTip,,,,pinkyTip]=m;
    const tips=[thumbTip,indexTip,middleTip,ringTip,pinkyTip];
    const palm={
      x:(wrist.x+indexTip.x+middleTip.x+ringTip.x+pinkyTip.x)/5,
      y:(wrist.y+indexTip.y+middleTip.y+ringTip.y+pinkyTip.y)/5
    };
    
    if(power==='void'){
      palmGlow(palm.x,palm.y,'rgba(0,255,255,.6)','rgba(0,100,200,.2)',110,gctx);
      drawVoidAura(palm.x,palm.y,ctx);
      tips.forEach(t=>{
        spawnN(t.x,t.y,'void_warp',4);
      });
      if(Math.random()>0.75) spawnExplosion(palm.x,palm.y,'void_tear',6);
      spawnN(palm.x,palm.y,'void_warp',5);
      
    } else if(power==='quantum'){
      palmGlow(palm.x,palm.y,'rgba(255,20,147,.6)','rgba(138,43,226,.2)',110,gctx);
      drawQuantumField(palm.x,palm.y,ctx);
      tips.forEach(t=>{
        spawnN(t.x,t.y,'quantum_orb',3);
        spawnN(t.x,t.y,'quantum_spark',2);
      });
      if(Math.random()>0.7) spawnExplosion(palm.x,palm.y,'quantum_spark',8);
      spawnN(palm.x,palm.y,'quantum_orb',4);
      
    } else if(power==='inferno'){
      palmGlow(palm.x,palm.y,'rgba(255,150,0,.7)','rgba(255,50,0,.25)',110,gctx);
      drawInfernoRing(palm.x,palm.y,ctx);
      tips.forEach(t=>{
        spawnN(t.x,t.y,'inferno_blaze',5);
        spawnN(t.x,t.y,'inferno_ash',2);
      });
      if(Math.random()>0.65) spawnExplosion(palm.x,palm.y,'inferno_blaze',10);
      spawnN(palm.x,palm.y,'inferno_blaze',6);
      
    } else if(power==='celestial'){
      palmGlow(palm.x,palm.y,'rgba(220,100,255,.6)','rgba(138,43,226,.2)',110,gctx);
      drawCelestialHalo(palm.x,palm.y,ctx);
      tips.forEach(t=>{
        spawnN(t.x,t.y,'celestial_star',3);
        spawnN(t.x,t.y,'celestial_aura',1);
      });
      if(Math.random()>0.8) spawnExplosion(palm.x,palm.y,'celestial_star',7);
      spawnN(palm.x,palm.y,'celestial_aura',3);
      
    } else if(power==='spectral'){
      palmGlow(palm.x,palm.y,'rgba(0,255,136,.5)','rgba(0,180,100,.15)',110,gctx);
      drawSpectralVeil(palm.x,palm.y,ctx);
      tips.forEach(t=>{
        spawnN(t.x,t.y,'spectral_ghost',4);
      });
      if(Math.random()>0.8) spawnExplosion(palm.x,palm.y,'spectral_ghost',6);
      spawnN(palm.x,palm.y,'spectral_ghost',4);
    }
    
    const dc={void:'#00ffff',quantum:'#ff1493',inferno:'#ffaa00',celestial:'#da70d6',spectral:'#00ff88'}[power];
    ctx.save();
    tips.forEach(t=>{
      ctx.shadowBlur=30;
      ctx.shadowColor=dc;
      ctx.fillStyle=dc;
      ctx.globalAlpha=.95;
      ctx.beginPath();
      ctx.arc(t.x,t.y,8,0,Math.PI*2);
      ctx.fill();
    });
    ctx.restore();
  });
  
  particles=particles.filter(p=>p.life>0);
  particles.sort((a,b)=>(a.depth||0)-(b.depth||0));
  
  particles.forEach(p=>{
    p.life--;
    p.x+=p.vx;
    p.y+=p.vy;
    p.rotation+=p.angularVel;
    
    switch(p.type){
      case 'void_warp': p.vx*=.93;p.vy*=.93;p.rotation+=(Math.random()-.5)*.05;break;
      case 'void_tear': p.vx*=.90;p.vy*=.90;break;
      case 'quantum_orb': p.vx*=.92;p.vy*=.92;p.wobble+=p.wobbleSpeed;break;
      case 'quantum_spark': p.vx*=.85;p.vy*=.85;break;
      case 'inferno_blaze': p.vx*=.94;p.vy*=.95;p.vy-=.15;p.wobble+=p.wobbleSpeed;break;
      case 'inferno_ash': p.vx*=.96;p.vy*=.97;p.vy-=.08;break;
      case 'celestial_star': p.vx*=.94;p.vy*=.94;break;
      case 'celestial_aura': p.vx*=.91;p.vy*=.91;p.rotation+=(Math.random()-.5)*.03;break;
      case 'spectral_ghost': p.vx*=.92;p.vy*=.92;p.vx+=(Math.random()-.5)*.3;break;
    }
    
    switch(p.type){
      case 'void_warp': drawVoidWarp(p,pctx);break;
      case 'void_tear': drawVoidWarp(p,pctx);break;
      case 'quantum_orb': drawQuantumOrb(p,pctx);break;
      case 'quantum_spark': 
        pctx.save();
        pctx.globalAlpha=Math.pow(1-p.t,.8);
        pctx.shadowBlur=15;
        pctx.shadowColor=`hsl(${p.hue},100%,80%)`;
        pctx.fillStyle=`hsl(${p.hue},100%,85%)`;
        pctx.beginPath();
        pctx.arc(p.x,p.y,p.size*1.3,0,Math.PI*2);
        pctx.fill();
        pctx.restore();
        break;
      case 'inferno_blaze': drawInfernoBlaze(p,pctx);break;
      case 'inferno_ash': drawInfernoBlaze(p,pctx);break;
      case 'celestial_star': drawCelestialStar(p,pctx);break;
      case 'celestial_aura': drawQuantumOrb(p,pctx);break;
      case 'spectral_ghost': drawSpectralGhost(p,pctx);break;
    }
  });
}

async function startCamera(){
  startScreen.style.display='none';
  resize();
  animate();
  
  try{
    const stream=await navigator.mediaDevices.getUserMedia({
      video:{facingMode:'user',width:{ideal:1280},height:{ideal:720}}
    });
    video.srcObject=stream;
    
    await new Promise(res=>{
      video.onloadedmetadata=()=>video.play().then(res).catch(res);
    });
    
    statEl.textContent='⚡ LOADING POWER...';
    statEl.style.color='#00ffff';
    
    const hands=new Hands({
      locateFile:f=>`https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
    });
    
    hands.setOptions({
      maxNumHands:2,
      modelComplexity:1,
      minDetectionConfidence:0.65,
      minTrackingConfidence:0.55
    });
    
    hands.onResults(r=>{
      handPoints=r.multiHandLandmarks||[];
    });
    
    await hands.initialize();
    statEl.textContent='✨ POWER UNLOCKED — SELECT YOUR FORCE ✨';
    statEl.style.color='#00ff88';
    
    setTimeout(()=>{
      statEl.style.display='none';
    },3000);
    
    const cam=new Camera(video,{
      onFrame:async()=>{
        await hands.send({image:video});
      },
      width:1280,
      height:720
    });
    
    cam.start();
    
  } catch(e){
    statEl.textContent='⚠️ SYSTEM ERROR: '+e.message;
    statEl.style.color='#ff4444';
    console.error(e);
  }
}

startBtn.addEventListener('click',startCamera);
</script>
</body>
